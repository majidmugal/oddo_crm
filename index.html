{% extends 'base.html' %} {% block content %}

<a href="/add" class="btn btn-primary mb-3"> Add Lead </a>

<table class="table table-bordered">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Phone</th>
    <th>Status</th>
  </tr>

  {% for lead in leads %}
  <tr>
    <td>{{ lead.id }}</td>
    <td>{{ lead.name }}</td>
    <td>{{ lead.email }}</td>
    <td>{{ lead.phone }}</td>
    <td>{{ lead.status }}</td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
